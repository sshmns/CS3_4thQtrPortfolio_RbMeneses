<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meneses Portfolio</title>

<style>
  body {
    margin: 0;
    padding-top: 40px;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    margin: 0;
    font-size: 28px;
  }

  .header p {
    margin: 5px 0 0;
    font-size: 16px;
    color: #555;
  }

  .container {
    padding: 0 20px;
  }

  /* FOLDER */
  .section {
    position: relative;
    height: 120px;
    margin: -30px 0;
    padding: 30px 20px 20px;
    border-radius: 15px;
    font-weight: bold;
    display: flex;
    align-items: center;

    transform-origin: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  /* TAB */
  .section::before {
    content: attr(data-title);
    position: absolute;
    top: -20px;
    left: 20px;
    padding: 6px 14px;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    font-weight: bold;
  }

  /* HOVER */
  .section:hover {
    transform: scale(1.03);
    z-index: 20;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  /* COLORS */
  .pink { background: #f7c6d9; z-index: 6; }
  .pink::before { background: #f7c6d9; }

  .green { background: #d9f2c4; z-index: 5; }
  .green::before { background: #d9f2c4; }

  .peach { background: #ffd6c9; z-index: 4; }
  .peach::before { background: #ffd6c9; }

  .pink2 { background: #f4b6c2; z-index: 3; }
  .pink2::before { background: #f4b6c2; }

  .blue { background: #cfe2ff; z-index: 2; }
  .blue::before { background: #cfe2ff; }

  .darkblue { background: #5a6ee1; color: white; z-index: 1; }
  .darkblue::before { background: #5a6ee1; color: white; }

  /* CLICKABLE TEXT */
  .section a {
    background: rgba(255,255,255,0.7);
    padding: 6px 12px;
    border-radius: 12px;
    text-decoration: none;
    color: black;
    transition: 0.2s;
  }

  .darkblue a {
    color: black;
  }

  .section a:hover {
    background: white;
  }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
